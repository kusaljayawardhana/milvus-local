<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Healthcare CV Search</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      :root {
        --color-text-primary: #1a1a1a;
        --color-text-secondary: #555;
        --color-text-tertiary: #888;
        --color-background-primary: #fff;
        --color-background-secondary: #f5f5f3;
        --color-border-tertiary: rgba(0,0,0,0.12);
        --color-border-secondary: rgba(0,0,0,0.22);
        --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        --border-radius-md: 8px;
        --border-radius-lg: 12px;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --color-text-primary: #f0f0ee;
          --color-text-secondary: #aaa;
          --color-text-tertiary: #666;
          --color-background-primary: #1e1e1c;
          --color-background-secondary: #2a2a28;
          --color-border-tertiary: rgba(255,255,255,0.1);
          --color-border-secondary: rgba(255,255,255,0.18);
        }
      }
      body {
        margin: 0; font-family: var(--font-sans);
        background: var(--color-background-secondary);
        color: var(--color-text-primary);
        font-size: 15px; line-height: 1.6;
      }
      input, select, textarea {
        font-family: var(--font-sans); font-size: 13px;
        background: var(--color-background-primary);
        color: var(--color-text-primary);
        border: 0.5px solid var(--color-border-secondary);
        border-radius: var(--border-radius-md);
        padding: 8px 10px; outline: none;
        transition: border-color 0.15s;
      }
      input:focus, select:focus, textarea:focus {
        border-color: #185fa5;
        box-shadow: 0 0 0 2px rgba(24,95,165,0.15);
      }
      button { font-family: var(--font-sans); transition: all 0.15s; }
      button:active { transform: scale(0.98); }
      .sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; }
      #root { min-height: 100vh; background: var(--color-background-secondary); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
